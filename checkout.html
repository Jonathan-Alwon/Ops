<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440, initial-scale=1" />
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="./android-chrome-192x192.png" />
  <title>ALWON OS · Checkout · runtime</title>
  <link rel="stylesheet" href="./css/alwon.css" />
  <style>
    .ck-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border-1);
    }
    .ck-grid > .cell { background: var(--bg-1); display: flex; flex-direction: column; }
    .ck-grid .span-2 { grid-column: span 2; }
    .ck-grid .span-3 { grid-column: span 3; }

    /* Lane grid */
    .lane-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 1px;
      background: var(--border-1);
      padding: 1px;
    }
    .lane {
      background: var(--bg-1);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 130px;
      position: relative;
    }
    .lane.idle  { color: var(--fg-3); }
    .lane.active { box-shadow: inset 2px 0 0 var(--signal); }
    .lane.hold  { box-shadow: inset 2px 0 0 var(--warn); }
    .lane.tender { box-shadow: inset 2px 0 0 var(--telemetry); }
    .lane .pos-id {
      font-family: var(--font-mono);
      font-size: var(--t-11);
      color: var(--fg-0);
      letter-spacing: 0.04em;
    }
    .lane.idle .pos-id { color: var(--fg-3); }
    .lane .op {
      font-family: var(--font-mono);
      font-size: var(--t-10);
      color: var(--fg-2);
    }
    .lane .state-line {
      display: flex; align-items: center; gap: 5px;
      font-family: var(--font-mono);
      font-size: var(--t-10);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 2px;
    }
    .lane .basket {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 4px;
      margin-top: auto;
    }
    .lane .basket .items {
      font-family: var(--font-mono);
      font-size: var(--t-10);
      color: var(--fg-3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .lane .basket .total {
      font-family: var(--font-mono);
      font-size: var(--t-14);
      color: var(--fg-0);
      letter-spacing: -0.005em;
    }
    .lane .dur {
      position: absolute; top: 8px; right: 10px;
      font-family: var(--font-mono);
      font-size: var(--t-10);
      color: var(--fg-3);
      letter-spacing: 0.04em;
    }
    .lane.idle .basket .total { color: var(--fg-3); }
    .lane.idle .basket { display: none; }
    .lane.idle .op::after { content: "lane idle · 02:14 since"; }
    .lane.idle .op { color: var(--fg-3); }

    /* Funnel */
    .funnel-row {
      display: grid;
      grid-template-columns: 200px 1fr 80px;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border-1);
    }
    .funnel-row .lbl {
      font-size: var(--t-12);
      color: var(--fg-1);
    }
    .funnel-row .lbl .sub {
      font-family: var(--font-mono);
      font-size: var(--t-10);
      color: var(--fg-3);
      letter-spacing: 0.04em;
      margin-top: 2px;
    }
    .funnel-bar {
      height: 22px;
      background: var(--bg-3);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }
    .funnel-bar .fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: linear-gradient(90deg, var(--signal) 0%, var(--signal-2) 100%);
    }
    .funnel-row .pct {
      font-family: var(--font-mono);
      font-size: var(--t-14);
      color: var(--fg-0);
      text-align: right;
      letter-spacing: -0.005em;
    }
    .funnel-row .pct .delta {
      display: block;
      font-size: var(--t-10);
      color: var(--fg-3);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="./js/alwon.js"></script>
  <script>
    function laneIdle(n) {
      return `
        <div class="lane idle">
          <div class="pos-id">POS-${String(n).padStart(2,'0')}</div>
          <div class="op"></div>
          <div class="state-line dim-2">IDLE</div>
        </div>
      `;
    }
    function laneScan(n, op, opname, items, total, dur) {
      return `
        <div class="lane active">
          <div class="dur mono">${dur}</div>
          <div class="pos-id">POS-${String(n).padStart(2,'0')}</div>
          <div class="op">${op} · ${opname}</div>
          <div class="state-line fg-info"><span class="pulse info"></span>SCANNING</div>
          <div class="basket"><span class="items">${items} items</span><span class="total">$ ${total}</span></div>
        </div>
      `;
    }
    function laneTender(n, op, opname, items, total, dur, tender) {
      return `
        <div class="lane tender">
          <div class="dur mono">${dur}</div>
          <div class="pos-id">POS-${String(n).padStart(2,'0')}</div>
          <div class="op">${op} · ${opname}</div>
          <div class="state-line fg-telem"><span class="pulse telem"></span>TENDER · ${tender}</div>
          <div class="basket"><span class="items">${items} items</span><span class="total">$ ${total}</span></div>
        </div>
      `;
    }
    function laneHold(n, op, opname, items, total, dur, why) {
      return `
        <div class="lane hold">
          <div class="dur mono">${dur}</div>
          <div class="pos-id">POS-${String(n).padStart(2,'0')}</div>
          <div class="op">${op} · ${opname}</div>
          <div class="state-line fg-warn"><span class="pulse warn"></span>HOLD · ${why}</div>
          <div class="basket"><span class="items">${items} items</span><span class="total">$ ${total}</span></div>

            </div>

            </div>
            <div class="funnel-row">
              <div class="lbl">Authorisation success<div class="sub">processor returned ok</div></div>
              <div class="funnel-bar"><div class="fill" style="width: 92.6%;"></div></div>
              <div class="pct">276<span class="delta">92.6% · −5</span></div>

              <div class="pct">275<span class="delta">92.4% · −1</span></div>
            </div>
          </div>
        </div>

        <!-- DROP-OFF REASONS -->
        <div class="cell">
          <div class="panel-head">
            <span class="label">CH 3</span>
            <span class="title">Drop-off &amp; failures · 1h</span>

          </div>
          <div style="padding: 12px 14px;">
            <div style="display: grid; grid-template-columns: 1fr auto; gap: 10px 8px; align-items: center;">
              <div class="mono s11 up">basket.abandoned (no scan)</div>

              <div class="mono s11 up" style="margin-top: 4px;">tender.declined</div>

            </div>

              <tr>

            </tbody>

        </div>
      </div>
    `;

    ALWON.init({
      active: 'checkout',
      main: mainHtml,

  </script>
</body>
</html>
