<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440, initial-scale=1" />
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="./android-chrome-192x192.png" />
  <title>ALWON OS · Observability · Runtime infra</title>
  <link rel="stylesheet" href="./css/alwon.css" />
  <style>
    .obs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border-1);
    }
    .obs > .cell { background: var(--bg-1); display: flex; flex-direction: column; }
    .obs .span-2 { grid-column: span 2; }
    .obs .span-3 { grid-column: span 3; }

    .slo-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--border-1);
    }
    .slo-card .head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .slo-card .name { font-family: var(--font-mono); font-size: var(--t-12); color: var(--fg-0); }
    .slo-card .desc { font-size: var(--t-11); color: var(--fg-2); }
    .slo-card .num {
      font-family: var(--font-mono); font-size: var(--t-20); color: var(--fg-0); letter-spacing: -0.01em;
    }
    .slo-card .budget {
      font-family: var(--font-mono); font-size: var(--t-10); color: var(--fg-2);
      letter-spacing: 0.06em;
    }

    /* topology */
    .topology {
      padding: 14px;
      min-height: 320px;
    }
    .topo-svg { width: 100%; height: 360px; display: block; }
    .topo-svg .node-rect {
      fill: var(--bg-2); stroke: var(--border-3); stroke-width: 1;
    }
    .topo-svg text { font-family: ui-monospace, monospace; font-size: 11px; fill: var(--fg-0); }
    .topo-svg .label { font-size: 9px; fill: var(--fg-2); letter-spacing: 0.06em; text-transform: uppercase; }

    /* edge fleet table */
    .fleet { width: 100%; border-collapse: collapse; }
    .fleet th {
      text-align: left;
      font-family: var(--font-mono); font-size: var(--t-10);
      color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.10em;
      padding: 8px 12px; border-bottom: 1px solid var(--border-2); background: var(--bg-1);
      font-weight: 500;
    }
    .fleet td {
      padding: 7px 12px;
      border-bottom: 1px solid var(--border-1);
      font-size: var(--t-12);
    }
    .fleet td.mono { font-family: var(--font-mono); font-size: var(--t-11); }
    .fleet tr:hover td { background: var(--bg-2); }

    /* pipeline chart */
    .pipeline-chart-frame {
      padding: 8px 12px 14px 36px;
      position: relative;
      height: 200px;
    }
    .pipeline-chart-frame svg { width: 100%; height: 100%; display: block; }

    /* webhook list */
    .wh-row {
      display: grid;
      grid-template-columns: 7px 1fr auto auto auto;
      gap: 12px;
      padding: 7px 12px;
      align-items: center;
      border-bottom: 1px solid var(--border-1);
      font-size: var(--t-12);
    }
    .wh-row .url {
      font-family: var(--font-mono); font-size: var(--t-11); color: var(--fg-0);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .wh-row .sub { font-family: var(--font-mono); font-size: var(--t-10); color: var(--fg-3); letter-spacing: 0.04em; margin-top: 1px; }
    .wh-row .num { font-family: var(--font-mono); font-size: var(--t-11); color: var(--fg-1); text-align: right; }

    /* heatmap */
    .heatmap-grid {
      display: grid;
      grid-template-columns: 80px repeat(24, 1fr);
      gap: 2px;
      padding: 12px 14px;
      font-family: var(--font-mono); font-size: var(--t-10);
      color: var(--fg-3);
    }
    .heatmap-grid .lbl { color: var(--fg-2); padding-right: 6px; text-align: right; }
    .heatmap-grid .cellbox { height: 14px; border-radius: 2px; background: var(--bg-3); }
  </style>
</head>

    function heatRow(label, intensities) {
      return `<div class="lbl">${label}</div>` + intensities.map(v => {
        let bg;
        if (v < 0.10) bg = '#11141a';
        else if (v < 0.30) bg = 'rgba(6,144,252,0.18)';
        else if (v < 0.55) bg = 'rgba(6,144,252,0.38)';
        else if (v < 0.78) bg = 'rgba(96,231,255,0.55)';
        else bg = 'rgba(255,181,71,0.75)';
        return `<div class="cellbox" style="background:${bg}" title="${(v*100).toFixed(0)}%"></div>`;
      }).join('');
    }
    function gen(seed, base, vary) {
      let s = seed;
      const rng = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
      return Array.from({ length: 24 }, () => Math.max(0.02, Math.min(0.98, base + (rng() - 0.5) * vary)));

    function stackedArea() {
      const cols = 60;
      const w = 1200 / cols;
      let r = 1009;
      const rng = () => { r = (r * 9301 + 49297) % 233280; return r / 233280; };
      // 5 families: edge, api, checkout, payment, vision
      const colors = ['#1eb55e', '#0690fc', '#38a8fd', '#60e7ff', '#ffb547'];
      const opacities = [0.45, 0.5, 0.55, 0.55, 0.7];
      const series = [];
      for (let s = 0; s < 5; s++) {
        const arr = [];
        let v = [60, 80, 90, 110, 28][s];
        for (let i = 0; i < cols; i++) {
          v += (rng() - 0.5) * 14;
          v = Math.max([14, 14, 18, 20, 4][s], Math.min([130, 160, 220, 180, 60][s], v));
          arr.push(v);
        }
        series.push(arr);
      }

      // stack
      const stacked = Array.from({length: cols}, () => 0);
      let out = '';
      for (let s = 0; s < series.length; s++) {
        const top = series[s].map((v, i) => stacked[i] + v);
        const bot = stacked.slice();
        const path = [];
        for (let i = 0; i < cols; i++) {
          const x = (i * w).toFixed(1);
          const y = (200 - top[i] * 0.6).toFixed(1);
          path.push(`${i === 0 ? 'M' : 'L'}${x} ${y}`);
        }
        for (let i = cols - 1; i >= 0; i--) {
          const x = (i * w).toFixed(1);
          const y = (200 - bot[i] * 0.6).toFixed(1);
          path.push(`L${x} ${y}`);
        }
        path.push('Z');
        out += `<path d="${path.join(' ')}" fill="${colors[s]}" opacity="${opacities[s]}"/>`;
        // top line
        const topPath = top.map((y, i) => `${i === 0 ? 'M' : 'L'}${(i*w).toFixed(1)} ${(200 - y*0.6).toFixed(1)}`).join(' ');
        out += `<path d="${topPath}" stroke="${colors[s]}" stroke-width="1" fill="none" opacity="0.95"/>`;
        stacked.forEach((_, i) => stacked[i] = top[i]);
      }
      return out;
    }
