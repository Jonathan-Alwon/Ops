<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440, initial-scale=1" />
  <title>ALWON OS · Dashboard · Ops · BOG-001</title>
  <link rel="stylesheet" href="./css/alwon.css" />
  <style>
    .dash {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      grid-template-rows: minmax(220px, auto) minmax(0, 1fr) minmax(220px, auto);
      gap: 1px;
      background: var(--border-1);
      height: calc(100vh - var(--topbar-h) - var(--statusbar-h) - 36px);
      min-height: 720px;
    }
    .dash > .cell { background: var(--bg-0); display: flex; flex-direction: column; min-height: 0; }
    .dash .row-1-left  { grid-column: 1; grid-row: 1; }
    .dash .row-1-right { grid-column: 2; grid-row: 1 / span 2; }
    .dash .row-2-left  { grid-column: 1; grid-row: 2; }
    .dash .row-3       { grid-column: 1 / span 2; grid-row: 3; display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 1px; background: var(--border-1); }
    .dash .row-3 > .cell { background: var(--bg-0); }

    /* Chart shell */
    .chart-frame {
      flex: 1;
      position: relative;
      padding: 8px 12px 18px 36px;
      min-height: 0;
    }
    .chart-svg { width: 100%; height: 100%; display: block; }
    .chart-legend {
      display: flex; align-items: center; gap: 16px;
      padding: 6px 12px;
      font-family: var(--font-mono);
      font-size: var(--t-10);
      color: var(--fg-2);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-top: 1px solid var(--border-1);
    }
    .chart-legend .legend-item { display: inline-flex; align-items: center; gap: 5px; }
    .chart-legend .legend-mark {
      width: 12px; height: 2px; display: inline-block; background: currentColor;
    }
    .chart-legend .v {
      font-family: var(--font-mono);
      color: var(--fg-0);
      margin-left: 4px;
    }

    /* Alerts panel */
    .alert-row {
      display: grid;
      grid-template-columns: 8px 1fr auto;
      gap: 10px;
      padding: 9px 12px;
      border-bottom: 1px solid var(--border-1);
      font-size: var(--t-12);
      position: relative;
      align-items: center;
    }
    .alert-row::before {
      content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
    }
    .alert-row.crit::before { background: var(--crit); }
    .alert-row.warn::before { background: var(--warn); }
    .alert-row.info::before { background: var(--signal); }
    .alert-row .severity {
      width: 6px; height: 6px; border-radius: 50%; margin-left: 2px;
    }
    .alert-row.crit .severity { background: var(--crit); box-shadow: 0 0 8px var(--crit); }
    .alert-row.warn .severity { background: var(--warn); }
    .alert-row.info .severity { background: var(--signal); }
    .alert-row .title { color: var(--fg-0); font-size: var(--t-12); margin-bottom: 2px; line-height: 1.3; }
    .alert-row .meta { font-family: var(--font-mono); font-size: var(--t-10); color: var(--fg-3); letter-spacing: 0.04em; }
    .alert-row .meta .accent { color: var(--fg-1); }
    .alert-row .age { font-family: var(--font-mono); font-size: var(--t-10); color: var(--fg-2); white-space: nowrap; }

    /* Edge service rows */
    .svc-row {
      display: grid;
      grid-template-columns: 7px 1fr auto auto;
      gap: 10px;
      padding: 7px 12px;
      border-bottom: 1px solid var(--border-1);
      align-items: center;
      font-size: var(--t-12);
    }
    .svc-row .name { color: var(--fg-0); font-family: var(--font-mono); font-size: var(--t-11); }
    .svc-row .sub  { color: var(--fg-3); font-family: var(--font-mono); font-size: var(--t-10); margin-top: 1px; letter-spacing: 0.06em; text-transform: uppercase; }
    .svc-row .val  { font-family: var(--font-mono); font-size: var(--t-11); color: var(--fg-0); }
    .svc-row .mini-bar {
      width: 64px; height: 4px; background: var(--bg-3); border-radius: 2px; position: relative; overflow: hidden;
    }
    .svc-row .mini-bar > span { display:block; height: 100%; background: var(--ok); }
    .svc-row .mini-bar.warn > span { background: var(--warn); }
    .svc-row .mini-bar.crit > span { background: var(--crit); }

    /* Inventory band */
    .inv-row {
      display: grid;
      grid-template-columns: 56px 1fr 60px 64px 70px;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      border-bottom: 1px solid var(--border-1);
      font-size: var(--t-12);
    }
    .inv-row:hover { background: var(--bg-2); }
    .inv-row .sku { font-family: var(--font-mono); font-size: var(--t-11); color: var(--fg-2); }
    .inv-row .name { color: var(--fg-0); font-size: var(--t-12); }
    .inv-row .shelf { font-family: var(--font-mono); font-size: var(--t-10); color: var(--fg-3); }
    .inv-row .stock { font-family: var(--font-mono); font-size: var(--t-12); text-align: right; color: var(--fg-0); }
    .inv-row .stock.low { color: var(--warn); }
    .inv-row .stock.oos { color: var(--crit); }

    /* Mini stat strip on the right rail */
    .mini-strip {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border-1);
    }
    .mini-strip > div {
      background: var(--bg-1);
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .mini-strip .lbl {
      font-family: var(--font-mono);
      font-size: var(--t-10);
      color: var(--fg-3);
      letter-spacing: 0.10em;
      text-transform: uppercase;
    }
    .mini-strip .v {
      font-family: var(--font-mono);
      font-size: var(--t-14);
      color: var(--fg-0);
    }
    .mini-strip .sub {
      font-family: var(--font-mono);
      font-size: var(--t-10);
      color: var(--fg-2);
    }

    /* Vision band */
    .vision-band {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border-1);
      padding: 1px;
    }
    .vision-cell {
      background: var(--bg-1);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .vision-thumb {
      aspect-ratio: 16/9;
      background:
        repeating-linear-gradient(45deg, #0a0c10 0, #0a0c10 8px, #0d1014 8px, #0d1014 12px),
        radial-gradient(ellipse at 30% 60%, rgba(96,231,255,0.18), transparent 60%);
      border: 1px solid var(--border-2);
      position: relative;
      overflow: hidden;
    }
    .vision-thumb .scanline {
      position: absolute; left: 0; right: 0; height: 1px; background: rgba(96,231,255,0.6);
      animation: scan 3s linear infinite;
    }
    @keyframes scan { 0%{top:0;} 100%{top:100%;} }
    .vision-thumb .cam-label {
      position: absolute; left: 6px; top: 6px;
      font-family: var(--font-mono); font-size: var(--t-10);
      color: var(--telemetry); letter-spacing: 0.08em;
      background: rgba(0,0,0,0.4); padding: 1px 4px; border-radius: 2px;
    }
    .vision-thumb .live-ind {
      position: absolute; right: 6px; top: 6px;
      display: flex; align-items: center; gap: 4px;
      font-family: var(--font-mono); font-size: 9px;
      color: var(--crit); letter-spacing: 0.10em;
    }
    .vision-thumb .conf {
      position: absolute; left: 6px; bottom: 6px;
      font-family: var(--font-mono); font-size: var(--t-10);
      color: var(--fg-1); letter-spacing: 0.04em;
      background: rgba(0,0,0,0.5); padding: 1px 4px; border-radius: 2px;
    }
    .vision-thumb .bbox {
      position: absolute;
      border: 1px solid var(--warn);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.3);
    }

    /* Processors strip */
    .proc-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-1);
      font-size: var(--t-12);
    }
    .proc-row .proc-name {
      font-family: var(--font-mono); color: var(--fg-0); font-size: var(--t-11);
    }
    .proc-row .proc-meta { font-family: var(--font-mono); font-size: var(--t-10); color: var(--fg-3); margin-top: 1px; letter-spacing: 0.04em; }
    .proc-row .pct { font-family: var(--font-mono); color: var(--fg-0); font-size: var(--t-12); }
    .proc-row .lat { font-family: var(--font-mono); color: var(--fg-2); font-size: var(--t-11); }

    /* Checkout sessions */
    .session-grid {
      display: grid;
      grid-template-columns: 70px 1fr 60px 90px 90px 70px 80px;
      gap: 8px;
      align-items: center;
      padding: 7px 12px;
      font-size: var(--t-12);
      border-bottom: 1px solid var(--border-1);
    }
    .session-grid:hover { background: var(--bg-2); }
    .session-grid .pos { font-family: var(--font-mono); color: var(--fg-0); font-size: var(--t-11); letter-spacing: 0.04em; }
    .session-grid .op { font-family: var(--font-mono); color: var(--fg-2); font-size: var(--t-10); }
    .session-grid .basket { font-family: var(--font-mono); color: var(--fg-0); font-size: var(--t-11); text-align: right; }
    .session-grid .total { font-family: var(--font-mono); color: var(--fg-0); font-size: var(--t-11); text-align: right; }
    .session-grid .dur { font-family: var(--font-mono); color: var(--fg-2); font-size: var(--t-10); text-align: right; }
    .session-grid .tender { font-family: var(--font-mono); color: var(--fg-1); font-size: var(--t-10); text-transform: uppercase; letter-spacing: 0.08em; }
  </style>
</head>
