<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440, initial-scale=1" />
  <title>ALWON OS · Messages · shared inbox</title>
  <link rel="stylesheet" href="./css/alwon.css" />
  <style>
    .msg-layout {
      display: grid;
      grid-template-columns: 200px 360px minmax(0, 1fr) 320px;
      gap: 1px;
      background: var(--border-1);
      height: calc(100vh - var(--topbar-h) - var(--statusbar-h) - 36px - 36px);
    }
    .msg-layout > .cell { background: var(--bg-1); min-height: 0; display: flex; flex-direction: column; }

    /* Channel sidebar */
    .channel-section { padding: 12px 10px 4px; }
    .channel-section h3 {
      font-family: var(--font-mono); font-size: var(--t-10); color: var(--fg-3);
      text-transform: uppercase; letter-spacing: 0.10em; margin: 0 0 6px 0; font-weight: 500;
      padding: 0 4px;
    }
    .ch-row {
      display: grid;
      grid-template-columns: 14px 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 5px 6px;
      font-size: var(--t-12);
      color: var(--fg-1);
      cursor: pointer;
      border-radius: var(--r-3);
    }
    .ch-row:hover { background: var(--bg-2); color: var(--fg-0); }
    .ch-row.active { background: var(--bg-3); color: var(--fg-0); }
    .ch-row .badge {
      font-family: var(--font-mono);
      font-size: var(--t-10);
      color: var(--fg-3);
      letter-spacing: 0.04em;
    }
    .ch-row.unread .badge {
      background: var(--signal);
      color: #fff;
      padding: 1px 5px;
      border-radius: 8px;
      font-size: 9px;
    }

    /* Conversation list */
    .conv-item {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-1);
      cursor: pointer;
      align-items: start;
    }
    .conv-item:hover { background: var(--bg-2); }
    .conv-item.selected { background: var(--bg-3); }
    .conv-item .avatar { margin-top: 2px; width: 30px; height: 30px; flex: 0 0 30px; }
    .conv-item .meta { min-width: 0; }
    .conv-item .meta .row1 {
      display: flex; align-items: center; gap: 8px; margin-bottom: 2px;
    }
    .conv-item .meta .name { font-size: var(--t-12); color: var(--fg-0); font-weight: 500; }
    .conv-item .meta .channel { font-family: var(--font-mono); font-size: var(--t-10); color: var(--fg-3); letter-spacing: 0.04em; text-transform: uppercase; }
    .conv-item .meta .preview {
      color: var(--fg-2); font-size: var(--t-12); line-height: 1.35;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .conv-item .meta .preview .last-from {
      font-family: var(--font-mono); font-size: var(--t-10); color: var(--fg-3); letter-spacing: 0.04em;
    }
    .conv-item.unread .meta .name { color: var(--fg-0); }
    .conv-item.unread::before {
      content: ""; position: absolute; left: 0; top: 10px; bottom: 10px; width: 2px; background: var(--signal);
    }
    .conv-item { position: relative; }
    .conv-item .conv-meta {
      text-align: right; display: flex; flex-direction: column; gap: 3px; align-items: flex-end;
    }
    .conv-item .conv-meta .age {
      font-family: var(--font-mono); font-size: var(--t-10); color: var(--fg-3); letter-spacing: 0.04em;
    }

    /* Thread */
    .thread {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }
    .thread-bubble {
      max-width: 70%;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: var(--t-13);
      line-height: 1.45;
      margin-bottom: 6px;
    }
    .thread-bubble.in {
      background: var(--bg-2);
      border: 1px solid var(--border-2);
      color: var(--fg-0);
      border-bottom-left-radius: 2px;
      margin-right: auto;
    }
    .thread-bubble.out {
      background: var(--signal);
      color: #fff;
      border-bottom-right-radius: 2px;
      margin-left: auto;
    }
    .thread-bubble.note {
      background: var(--warn-bg);
      border: 1px solid rgba(255, 181, 71, 0.32);
      color: var(--warn);
      font-family: var(--font-mono);
      font-size: var(--t-11);
      max-width: 80%;
      margin: 6px auto;
      letter-spacing: 0.01em;
    }
    .thread-meta {
      display: flex; align-items: center; gap: 6px;
      margin-top: 4px; margin-bottom: 14px;
      font-family: var(--font-mono); font-size: var(--t-10);
      color: var(--fg-3); letter-spacing: 0.04em;
    }
    .thread-meta.out { justify-content: flex-end; }
    .thread-section-label {
      text-align: center;
      font-family: var(--font-mono); font-size: var(--t-10); letter-spacing: 0.10em;
      color: var(--fg-3); text-transform: uppercase;
      margin: 12px 0 12px 0;
      position: relative;
    }
    .thread-section-label::before, .thread-section-label::after {
      content: ""; position: absolute; top: 50%; width: 30%; height: 1px; background: var(--border-1);
    }
    .thread-section-label::before { left: 0; }
    .thread-section-label::after  { right: 0; }

    .composer {
      border-top: 1px solid var(--border-1);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-1);
    }
    .composer .input {
      flex: 1;
      background: var(--bg-2);
      border: 1px solid var(--border-2);
      border-radius: var(--r-3);
      padding: 8px 10px;
      color: var(--fg-1);
      font-size: var(--t-13);
    }

    /* Customer panel */
    .cust-panel { padding: 0; }
    .cust-head {
      display: flex; flex-direction: column; gap: 6px;
      padding: 14px;
      border-bottom: 1px solid var(--border-1);
    }
    .cust-head .name { color: var(--fg-0); font-size: var(--t-14); }
    .cust-head .id { font-family: var(--font-mono); font-size: var(--t-10); color: var(--fg-3); letter-spacing: 0.04em; }
  </style>
</head>
