<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440, initial-scale=1" />
  <title>ALWON OS · Settings · runtime config</title>
  <link rel="stylesheet" href="./css/alwon.css" />
  <style>
    .settings {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 1px;
      background: var(--border-1);
      min-height: calc(100vh - var(--topbar-h) - var(--statusbar-h) - 36px - 36px);
    }
    .settings > .cell { background: var(--bg-1); display: flex; flex-direction: column; }

    .set-nav-section { padding: 14px 10px 4px; }
    .set-nav-section h3 {
      font-family: var(--font-mono); font-size: var(--t-10); color: var(--fg-3);
      text-transform: uppercase; letter-spacing: 0.10em; margin: 0 0 6px 0; font-weight: 500;
      padding: 0 4px;
    }
    .set-nav-row {
      display: grid;
      grid-template-columns: 14px 1fr;
      gap: 8px;
      align-items: center;
      padding: 5px 6px;
      font-size: var(--t-12);
      color: var(--fg-1);
      cursor: pointer;
      border-radius: var(--r-3);
    }
    .set-nav-row:hover { background: var(--bg-2); color: var(--fg-0); }
    .set-nav-row.active { background: var(--bg-3); color: var(--fg-0); }
    .set-nav-row .nav-icon { color: var(--fg-2); }
    .set-nav-row.active .nav-icon { color: var(--fg-0); }

    /* Section + form */
    .sec {
      border-bottom: 1px solid var(--border-1);
    }
    .sec-head {
      padding: 16px 20px 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 12px;
    }
    .sec-head h2 {
      font-size: var(--t-16); color: var(--fg-0); margin: 0; font-weight: 500;
      letter-spacing: -0.005em;
    }
    .sec-head .sub {
      font-family: var(--font-mono); font-size: var(--t-11); color: var(--fg-3);
      letter-spacing: 0.04em; margin-top: 4px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 14px 24px;
      padding: 14px 20px 20px;
    }
    .form-grid .lbl {
      font-size: var(--t-12); color: var(--fg-0);
      padding-top: 6px;
    }
    .form-grid .lbl .sub {
      display: block; font-family: var(--font-mono); font-size: var(--t-10);
      color: var(--fg-3); letter-spacing: 0.04em; margin-top: 4px; line-height: 1.5;
    }
    .form-grid .ctl { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    .toggle .track {
      width: 32px; height: 18px;
      background: var(--bg-3); border-radius: 10px; position: relative;
      transition: background 0.12s ease;
      border: 1px solid var(--border-2);
    }
    .toggle .knob {
      position: absolute; left: 1px; top: 1px;
      width: 14px; height: 14px; background: var(--fg-2); border-radius: 50%;
      transition: transform 0.12s ease, background 0.12s ease;
    }
    .toggle.on .track { background: var(--signal); border-color: var(--signal); }
    .toggle.on .knob { transform: translateX(14px); background: #fff; }
    .toggle .lbl { font-size: var(--t-12); color: var(--fg-1); }

    .integration-row {
      display: grid;
      grid-template-columns: 8px 38px 1fr auto auto;
      gap: 12px;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border-1);
      cursor: pointer;
    }
    .integration-row:hover { background: var(--bg-2); }
    .integration-row .logo {
      width: 30px; height: 30px;
      background: var(--bg-3); border-radius: var(--r-3); border: 1px solid var(--border-2);
      display: grid; place-items: center;
      font-family: var(--font-mono); font-size: var(--t-11); color: var(--fg-0);
      letter-spacing: 0.04em;
    }
    .integration-row .name { font-size: var(--t-13); color: var(--fg-0); }
    .integration-row .sub { font-family: var(--font-mono); font-size: var(--t-10); color: var(--fg-3); letter-spacing: 0.02em; margin-top: 2px; }
    .integration-row .mark {
      width: 3px; align-self: stretch; border-radius: 1px;
      margin-left: -8px;
    }
    .integration-row .mark.ok { background: var(--ok); }
    .integration-row .mark.warn { background: var(--warn); }
    .integration-row .mark.idle { background: var(--fg-4); }

    .api-key {
      font-family: var(--font-mono);
      font-size: var(--t-11);
      background: var(--bg-2);
      border: 1px solid var(--border-2);
      border-radius: var(--r-3);
      padding: 6px 10px;
      color: var(--fg-1);
      letter-spacing: 0.04em;
    }
  </style>
</head>
