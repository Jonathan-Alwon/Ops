<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440, initial-scale=1" />
  <title>ALWON OS · Dashboard · Manage · Fleet</title>
  <link rel="stylesheet" href="./css/alwon.css" />
  <style>
    /* Period selector — compact pill row, operational not marketing */
    .period-row {
      display: flex; align-items: center; gap: 1px;
      background: var(--border-1);
      border: 1px solid var(--border-1);
      border-radius: 3px;
      padding: 0;
      font-family: var(--font-mono);
    }
    .period-row button {
      background: var(--bg-1);
      color: var(--fg-2);
      border: 0;
      padding: 5px 12px;
      font-family: var(--font-mono);
      font-size: var(--t-10);
      letter-spacing: 0.10em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 80ms, color 80ms;
    }
    .period-row button:hover { color: var(--fg-0); background: var(--bg-2); }
    .period-row button.active {
      background: var(--bg-3);
      color: var(--signal-2);
      box-shadow: inset 0 -2px 0 var(--signal);
    }

    /* Manage grid — quieter than ops, still dense */
    .mgr {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) 360px;
      grid-template-rows: minmax(280px, auto) minmax(0, 1fr) minmax(220px, auto);
      gap: 1px;
      background: var(--border-1);
      min-height: 820px;
    }
    .mgr > .cell { background: var(--bg-0); display: flex; flex-direction: column; min-height: 0; }
    .mgr .r1-left  { grid-column: 1; grid-row: 1; }
    .mgr .r1-right { grid-column: 2; grid-row: 1 / span 2; }
    .mgr .r2-left  { grid-column: 1; grid-row: 2; display: grid; grid-template-columns: 1.25fr 1fr; gap: 1px; background: var(--border-1); }
    .mgr .r2-left > .cell { background: var(--bg-0); }
    .mgr .r3       { grid-column: 1 / span 2; grid-row: 3; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--border-1); }
    .mgr .r3 > .cell { background: var(--bg-0); }

    /* Chart shell — same idiom as ops */
    .chart-frame {
      flex: 1;
      position: relative;
      padding: 8px 14px 22px 44px;
      min-height: 0;
    }
    .chart-svg { width: 100%; height: 100%; display: block; }
    .chart-legend {
      display: flex; align-items: center; gap: 18px;
      padding: 6px 14px;
      font-family: var(--font-mono);
      font-size: var(--t-10);
      color: var(--fg-2);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-top: 1px solid var(--border-1);
    }
    .chart-legend .legend-item { display: inline-flex; align-items: center; gap: 5px; }
    .chart-legend .legend-mark { width: 12px; height: 2px; display: inline-block; background: currentColor; }
    .chart-legend .v { font-family: var(--font-mono); color: var(--fg-0); margin-left: 4px; }

    /* Store fleet ranking */
    .rank-row {
      display: grid;
      grid-template-columns: 24px 1fr 72px 92px 72px 56px;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-bottom: 1px solid var(--border-1);
      font-size: var(--t-12);
    }
    .rank-row:hover { background: var(--bg-2); }
    .rank-row .rk {
      font-family: var(--font-mono);
      font-size: var(--t-10);
      color: var(--fg-3);
      letter-spacing: 0.08em;
    }
    .rank-row .store-id {
      font-family: var(--font-mono);
      font-size: var(--t-11);
      color: var(--fg-2);
      letter-spacing: 0.04em;
    }
    .rank-row .store-name { color: var(--fg-0); font-size: var(--t-12); }
    .rank-row .rev {
      font-family: var(--font-mono);
      font-size: var(--t-12);
      color: var(--fg-0);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .rank-row .rev-sub {
      font-family: var(--font-mono);
      font-size: var(--t-10);
      color: var(--fg-3);
      letter-spacing: 0.04em;
      text-align: right;
      margin-top: 1px;
    }
    .rank-row .pop {
      font-family: var(--font-mono);
      font-size: var(--t-11);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .rank-row .pop.up { color: var(--ok); }
    .rank-row .pop.down { color: var(--crit); }
    .rank-row .pop.flat { color: var(--fg-2); }
    .rank-row .rank-spark { color: var(--signal); }

    /* Category breakdown horizontal bars */
    .cat-row {
      display: grid;
      grid-template-columns: 130px 1fr 70px 64px;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border-1);
      font-size: var(--t-12);
    }
    .cat-row:hover { background: var(--bg-2); }
    .cat-row .cat-name { color: var(--fg-0); font-size: var(--t-12); }
    .cat-row .cat-sub { color: var(--fg-3); font-size: var(--t-10); font-family: var(--font-mono); letter-spacing: 0.04em; margin-top: 1px; }
    .cat-bar {
      height: 5px;
      background: var(--bg-3);
      border-radius: 1px;
      position: relative;
      overflow: hidden;
    }
    .cat-bar > span { display: block; height: 100%; background: var(--signal); }
    .cat-bar > span.tg { background: var(--telemetry); }
    .cat-bar > span.amber { background: var(--warn); }
    .cat-row .cat-rev { font-family: var(--font-mono); font-size: var(--t-12); color: var(--fg-0); text-align: right; font-variant-numeric: tabular-nums; }
    .cat-row .cat-margin { font-family: var(--font-mono); font-size: var(--t-11); color: var(--fg-1); text-align: right; font-variant-numeric: tabular-nums; }
    .cat-row .cat-margin.warn { color: var(--warn); }
    .cat-row .cat-margin.up { color: var(--ok); }

    /* Watchdog insight cards */
    .insight {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border-1);
      position: relative;
    }
    .insight::before {
      content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
    }
    .insight.pos::before { background: var(--ok); }
    .insight.neg::before { background: var(--crit); }
    .insight.warn::before { background: var(--warn); }
    .insight.info::before { background: var(--signal); }
    .insight .head {
      display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
    }
    .insight .tag {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 2px;
      border: 1px solid var(--border-2);
      color: var(--fg-2);
    }
    .insight.pos .tag { color: var(--ok); border-color: rgba(30,181,94,0.4); }
    .insight.neg .tag { color: var(--crit); border-color: rgba(229,72,77,0.5); }
    .insight.warn .tag { color: var(--warn); border-color: rgba(255,181,71,0.4); }
    .insight.info .tag { color: var(--signal); border-color: rgba(6,144,252,0.4); }
    .insight .ts {
      font-family: var(--font-mono);
      font-size: var(--t-10);
      color: var(--fg-3);
      letter-spacing: 0.04em;
      margin-left: auto;
    }
    .insight .body { color: var(--fg-0); font-size: var(--t-12); line-height: 1.45; }
    .insight .body .em { color: var(--signal-2); font-family: var(--font-mono); }
    .insight .body .crit { color: var(--crit); font-family: var(--font-mono); }
    .insight .body .ok { color: var(--ok); font-family: var(--font-mono); }
    .insight .meta {
      margin-top: 6px;
      font-family: var(--font-mono);
      font-size: var(--t-10);
      color: var(--fg-3);
      letter-spacing: 0.04em;
    }
    .insight .meta .sep { margin: 0 6px; color: var(--border-2); }

    /* SKU table */
    .sku-row {
      display: grid;
      grid-template-columns: 56px 1fr 70px 64px 56px;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border-1);
      font-size: var(--t-12);
    }
    .sku-row:hover { background: var(--bg-2); }
    .sku-row .sku { font-family: var(--font-mono); font-size: var(--t-11); color: var(--fg-2); }
    .sku-row .name { color: var(--fg-0); font-size: var(--t-12); }
    .sku-row .sub { color: var(--fg-3); font-size: var(--t-10); font-family: var(--font-mono); margin-top: 1px; letter-spacing: 0.04em; }
    .sku-row .num { font-family: var(--font-mono); font-size: var(--t-12); color: var(--fg-0); text-align: right; font-variant-numeric: tabular-nums; }
    .sku-row .marg { font-family: var(--font-mono); font-size: var(--t-11); color: var(--ok); text-align: right; font-variant-numeric: tabular-nums; }
    .sku-row .delta { font-family: var(--font-mono); font-size: var(--t-10); text-align: right; letter-spacing: 0.04em; font-variant-numeric: tabular-nums; }
    .sku-row .delta.up { color: var(--ok); }
    .sku-row .delta.down { color: var(--crit); }

    /* Period progress gauge */
    .pace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border-1);
      border-bottom: 1px solid var(--border-1);
    }
    .pace > div {
      background: var(--bg-1);
      padding: 10px 14px;
      display: flex; flex-direction: column; gap: 3px;
    }
    .pace .lbl { font-family: var(--font-mono); font-size: var(--t-10); color: var(--fg-3); letter-spacing: 0.10em; text-transform: uppercase; }
    .pace .v   { font-family: var(--font-mono); font-size: var(--t-14); color: var(--fg-0); font-variant-numeric: tabular-nums; }
    .pace .sub { font-family: var(--font-mono); font-size: var(--t-10); color: var(--fg-2); letter-spacing: 0.04em; }

    .pace-bar {
      height: 6px;
      background: var(--bg-3);
      border-radius: 1px;
      position: relative;
      margin-top: 4px;
      overflow: hidden;
    }
    .pace-bar > .actual { position: absolute; left: 0; top: 0; bottom: 0; background: var(--signal); }
    .pace-bar > .pace-line { position: absolute; top: -2px; bottom: -2px; width: 1px; background: var(--telemetry); }
    .pace-bar > .pace-line::after {
      content: ""; position: absolute; top: -3px; left: -2px;
      width: 4px; height: 4px; background: var(--telemetry); border-radius: 1px;
    }

    /* Tender mix */
    .tender-stack {
      display: flex;
      height: 22px;
      background: var(--bg-3);
      border-radius: 2px;
      overflow: hidden;
      margin: 8px 14px;
      border: 1px solid var(--border-1);
    }
    .tender-stack > div {
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.05em;
      color: rgba(0,0,0,0.7); font-weight: 600;
    }
    .tender-row {
      display: grid;
      grid-template-columns: 10px 1fr 70px 56px;
      align-items: center;
      gap: 10px;
      padding: 7px 14px;
      border-bottom: 1px solid var(--border-1);
      font-size: var(--t-12);
    }
    .tender-row:hover { background: var(--bg-2); }
    .tender-row .swatch { width: 8px; height: 8px; border-radius: 1px; }
    .tender-row .name { color: var(--fg-0); font-size: var(--t-12); font-family: var(--font-mono); letter-spacing: 0.04em; }
    .tender-row .val { font-family: var(--font-mono); font-size: var(--t-12); color: var(--fg-0); text-align: right; font-variant-numeric: tabular-nums; }
    .tender-row .pct { font-family: var(--font-mono); font-size: var(--t-11); color: var(--fg-2); text-align: right; font-variant-numeric: tabular-nums; }
  </style>
</head>
