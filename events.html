<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440, initial-scale=1" />
  <title>ALWON OS · Events · BOG-001</title>
  <link rel="stylesheet" href="./css/alwon.css" />
  <style>
    .events-layout {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr) 380px;
      grid-template-rows: auto auto 1fr;
      gap: 1px;
      background: var(--border-1);
      height: calc(100vh - var(--topbar-h) - var(--statusbar-h) - 36px);
    }
    .events-layout > .cell { background: var(--bg-1); min-height: 0; display: flex; flex-direction: column; }
    .events-layout .left  { grid-column: 1; grid-row: 1 / span 3; }
    .events-layout .head  { grid-column: 2 / span 2; grid-row: 1; }
    .events-layout .histo { grid-column: 2 / span 2; grid-row: 2; }
    .events-layout .feed  { grid-column: 2; grid-row: 3; }
    .events-layout .insp  { grid-column: 3; grid-row: 3; }

    /* Filter sidebar */
    .filter-section { padding: 12px 12px 4px; }
    .filter-section h3 {
      font-family: var(--font-mono); font-size: var(--t-10); color: var(--fg-3);
      text-transform: uppercase; letter-spacing: 0.10em; margin: 0 0 6px 0; font-weight: 500;
    }
    .filter-row {
      display: grid;
      grid-template-columns: 14px 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 4px 6px;
      font-size: var(--t-12);
      color: var(--fg-1);
      border-radius: var(--r-3);
      cursor: pointer;
      user-select: none;
    }
    .filter-row:hover { background: var(--bg-2); color: var(--fg-0); }
    .filter-row.active { background: var(--bg-3); color: var(--fg-0); }
    .filter-row .chk {
      width: 12px; height: 12px; border: 1px solid var(--border-3); border-radius: 2px; position: relative;
    }
    .filter-row.active .chk { background: var(--signal); border-color: var(--signal); }
    .filter-row.active .chk::after {
      content: ""; position: absolute; left: 2px; top: 0; width: 3px; height: 7px;
      border-right: 1.5px solid #fff; border-bottom: 1.5px solid #fff; transform: rotate(45deg);
    }
    .filter-row .count {
      font-family: var(--font-mono); font-size: var(--t-10); color: var(--fg-3);
    }
    .filter-row .dot-mark { width: 7px; height: 7px; border-radius: 50%; }

    /* Toolbar */
    .events-toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-1);
    }

    /* Histogram */
    .events-histo {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-1);
      background: var(--bg-1);
    }
    .histo-svg { height: 64px; width: 100%; display: block; }
    .histo-legend {
      font-family: var(--font-mono);
      font-size: var(--t-10);
      color: var(--fg-3);
      letter-spacing: 0.04em;
      display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
      min-width: 120px;
    }
    .histo-legend .big {
      font-size: var(--t-16); color: var(--fg-0); letter-spacing: -0.005em;
    }
    .histo-legend .row { display: flex; align-items: center; gap: 6px; color: var(--fg-2); }

    /* Event row dense */
    .e-row {
      display: grid;
      grid-template-columns: 100px 70px 28px 70px 56px 1fr 80px;
      gap: 10px;
      align-items: center;
      padding: 5px 12px;
      border-bottom: 1px solid var(--border-1);
      font-family: var(--font-mono);
      font-size: var(--t-11);
      color: var(--fg-1);
      position: relative;
      cursor: pointer;
      white-space: nowrap;
    }
    .e-row:hover { background: var(--bg-2); }
    .e-row.selected { background: var(--bg-3); }
    .e-row .ts { color: var(--fg-3); font-size: var(--t-10); }
    .e-row .src { font-size: var(--t-10); text-transform: uppercase; letter-spacing: 0.10em; color: var(--fg-2); }
    .e-row .src.checkout { color: var(--signal-2); }
    .e-row .src.payment  { color: var(--telemetry); }
    .e-row .src.vision   { color: var(--warn); }
    .e-row .src.edge     { color: var(--ok); }
    .e-row .src.inv      { color: var(--fg-1); }
    .e-row .src.api      { color: var(--signal); }
    .e-row .src.auth     { color: var(--signal); }
    .e-row .src.lp       { color: var(--crit); }
    .e-row .sev-pill {
      width: 18px; height: 18px; display: grid; place-items: center;
      font-size: 9px; font-weight: 700; letter-spacing: 0; border-radius: 2px;
    }
    .e-row .sev-pill.crit { background: var(--crit-bg); color: var(--crit); }
    .e-row .sev-pill.warn { background: var(--warn-bg); color: var(--warn); }
    .e-row .sev-pill.ok   { background: var(--ok-bg);   color: var(--ok); }
    .e-row .sev-pill.info { background: var(--signal-bg); color: var(--signal); }
    .e-row .store { color: var(--fg-2); font-size: var(--t-10); letter-spacing: 0.04em; }
    .e-row .cat { font-size: var(--t-10); color: var(--fg-2); text-transform: uppercase; letter-spacing: 0.08em; }
    .e-row .msg { color: var(--fg-0); overflow: hidden; text-overflow: ellipsis; font-size: var(--t-11); }
    .e-row .conf { color: var(--fg-3); font-size: var(--t-10); text-align: right; }

    /* Inspector */
    .inspector { padding: 0; }
    .insp-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border-1);
      display: flex; flex-direction: column; gap: 6px;
    }
    .insp-head .id {
      font-family: var(--font-mono); font-size: var(--t-11); color: var(--fg-2); letter-spacing: 0.04em;
    }
    .insp-head .ttl { color: var(--fg-0); font-size: var(--t-14); line-height: 1.3; }
    .insp-tabs { display: flex; gap: 2px; padding: 0 8px; border-bottom: 1px solid var(--border-1); }
    .insp-tabs .tab { padding: 6px 8px; font-size: var(--t-11); }
    .insp-kv {
      display: grid; grid-template-columns: 110px 1fr; gap: 6px 12px;
      padding: 10px 14px; border-bottom: 1px solid var(--border-1);
      font-size: var(--t-12);
    }
    .insp-kv .k {
      font-family: var(--font-mono); font-size: var(--t-10);
      color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em;
    }
    .insp-kv .v { font-family: var(--font-mono); color: var(--fg-0); font-size: var(--t-11); word-break: break-all; }

    .insp-json {
      padding: 12px 14px;
      font-family: var(--font-mono);
      font-size: var(--t-11);
      color: var(--fg-1);
      line-height: 1.55;
      border-bottom: 1px solid var(--border-1);
    }
    .insp-json .k { color: var(--telemetry); }
    .insp-json .s { color: var(--fg-0); }
    .insp-json .n { color: var(--signal-2); }
    .insp-json .b { color: var(--warn); }

    .insp-actions {
      padding: 10px 14px;
      display: flex; gap: 6px; flex-wrap: wrap;
    }

    .filter-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 8px;
      border: 1px solid var(--border-2);
      border-radius: 12px;
      font-family: var(--font-mono);
      font-size: var(--t-10);
      color: var(--fg-1);
      letter-spacing: 0.04em;
      background: var(--bg-2);
      cursor: pointer;
    }
    .filter-chip.active { background: var(--signal-bg); border-color: rgba(6, 144, 252, 0.5); color: var(--signal-2); }
    .filter-chip .x { color: var(--fg-3); font-size: 10px; }

    .live-toggle {
      display: inline-flex; align-items: center; gap: 6px;
      height: 22px;
      padding: 0 8px 0 6px;
      background: var(--ok-bg);
      border: 1px solid rgba(30, 181, 94, 0.32);
      color: var(--ok);
      border-radius: var(--r-3);
      font-family: var(--font-mono);
      font-size: var(--t-10);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>

    function generateHisto() {
      const cols = 80;
      const w = 1000 / cols;
      let s = '';
      let r = 1729;
      const rng = () => { r = (r * 9301 + 49297) % 233280; return r / 233280; };
      for (let i = 0; i < cols; i++) {
        const h = 12 + rng() * 36;
        const ok = h * (0.5 + rng() * 0.2);
        const inf = h * 0.4;
        const wn = rng() < 0.06 ? h * 0.6 : 0;
        const cr = (i === 64 || i === 68) ? 18 : 0;
        const x = i * w;
        const baseY = 60 - ok;
        s += `<rect x="${x.toFixed(1)}" y="${(baseY).toFixed(1)}" width="${(w - 0.6).toFixed(1)}" height="${ok.toFixed(1)}" fill="#1eb55e" opacity="0.85"/>`;
        s += `<rect x="${x.toFixed(1)}" y="${(baseY - inf).toFixed(1)}" width="${(w - 0.6).toFixed(1)}" height="${inf.toFixed(1)}" fill="#0690fc" opacity="0.85"/>`;
        if (wn) s += `<rect x="${x.toFixed(1)}" y="${(baseY - inf - wn).toFixed(1)}" width="${(w - 0.6).toFixed(1)}" height="${wn.toFixed(1)}" fill="#ffb547" opacity="0.95"/>`;
        if (cr) s += `<rect x="${x.toFixed(1)}" y="${(baseY - inf - cr - 8).toFixed(1)}" width="${(w - 0.6).toFixed(1)}" height="${cr.toFixed(1)}" fill="#e5484d" opacity="0.95"/>`;
      }
      return s;
    }

    function renderRow(e, selected) {
      return `
        <div class="e-row${selected ? ' selected' : ''}">
          <span class="ts">${e.ts}</span>
          <span class="src ${e.src.toLowerCase()}">${e.src}</span>
          <span class="sev-pill ${e.sev}">${e.sev.toUpperCase().slice(0,1)}</span>
          <span class="cat">${e.cat}</span>
          <span class="store">${e.store}</span>
          <span class="msg">${e.msg}</span>
          <span class="conf">${e.conf}</span>
        </div>
      `;
    }

    ALWON.init({
      active: 'events',
      main: mainHtml,
      onMounted() {
        const stream = document.getElementById('evStream');
        if (stream) {
          stream.innerHTML = EVS.map((e, i) => renderRow(e, i === 4)).join('');

          /* Live event prepending */
          setInterval(() => {
            const ev = ALWON.makeEvent();
            const row = {
              ts: ev.ts,
              src: ev.src,
              sev: ev.sev,
              cat: ev.tone + '.live',
              store: 'BOG-001',
              msg: ev.msg,
              conf: 'auto'
            };
            const wrap = document.createElement('div');
            wrap.innerHTML = renderRow(row, false).trim();
            const node = wrap.firstChild;
            node.style.opacity = '0';
            stream.insertBefore(node, stream.firstChild);
            requestAnimationFrame(() => { node.style.transition = 'opacity 250ms ease-out'; node.style.opacity = '1'; });
            while (stream.children.length > 80) stream.removeChild(stream.lastChild);
          }, 1100);
        }

        /* Filter row toggle */
        document.querySelectorAll('.filter-row').forEach(r => {
          r.addEventListener('click', () => r.classList.toggle('active'));
        });

        /* Row click → selection */
        document.addEventListener('click', (e) => {
          const r = e.target.closest('.e-row');
          if (!r || r.closest('#evStream') === null) return;
          document.querySelectorAll('#evStream .e-row.selected').forEach(x => x.classList.remove('selected'));
          r.classList.add('selected');
        });
      }
    });
  </script>
